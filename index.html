<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk Kamu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:#000;
}

/* VIDEO BACKGROUND */

#bgVideo{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

filter:
brightness(.25)
blur(5px);

opacity:1;

z-index:-2;

}

/* OVERLAY */

.overlay{

position:fixed;

inset:0;

background:
linear-gradient(
to bottom,
rgba(0,0,0,.25),
rgba(0,0,0,.55)
);

z-index:-1;

}

/* PAGE */

.page{

height:100vh;

display:none;

justify-content:center;
align-items:center;
flex-direction:column;

padding:20px;

animation:
fade .8s ease;

}

.active{
display:flex;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* CARD */

.card{

width:820px;
max-width:95%;

background:
rgba(255,255,255,.92);

border-radius:35px;

padding:50px;

position:relative;

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,.6);

box-shadow:
0 25px 80px rgba(0,0,0,.25);

animation:
floatCard 4s ease-in-out infinite;

overflow:visible;

}

@keyframes floatCard{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0);
}

}

/* WATERMARK LOVE */

.card::before{

content:"❤️";

position:absolute;

right:25px;
bottom:0;

font-size:100px;

opacity:.07;

transform:rotate(-15deg);

}

/* LOVE POJOK */

.corner-love{

position:absolute;

font-size:24px;

opacity:.7;

animation:
floatLove 3s ease-in-out infinite;

}

.love-bottom-left{

left:15px;
bottom:15px;

}

.love-bottom-right{

right:15px;
bottom:15px;

animation-delay:1.5s;

}

@keyframes floatLove{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0);
}

}

/* TEXT */

.text{

font-family:'Caveat',cursive;

font-size:36px;

line-height:1.6;

text-align:center;

color:#3d3d3d;

white-space:pre-line;

}

/* LABEL */

.label{

position:absolute;

top:-18px;
left:30px;

background:#d17b88;

color:white;

padding:10px 20px;

border-radius:999px;

font-size:13px;

font-weight:700;

letter-spacing:1px;

box-shadow:
0 5px 15px rgba(209,123,136,.4);

}

/* FOTO */

.foto{

width:150px;
height:150px;

object-fit:cover;

display:block;

margin:0 auto 25px auto;

border-radius:20px;

border:5px solid white;

box-shadow:
0 8px 20px rgba(0,0,0,.2);

transform:rotate(-3deg);

}

/* BUTTON */

button{

margin-top:25px;

background:#d17b88;

color:white;

padding:15px 40px;

border:none;

border-radius:999px;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:
translateY(-3px)
scale(1.03);

}

</style>

</head>

<body>

<script>

/* =========================
   ISI PESAN
========================= */

const texts = [

`Hai sayang...

Kalau kamu lagi baca ini sekarang,
makasih ya udah mau luangin waktu buat lihat semua ini.`,

`Sebenernya aku nggak bikin ini karena aku kehilangan kamu sepenuhnya.

Karena sampai hari ini kita masih ngobrol.
Masih teleponan.
Masih keluar juga.

Dan jujur...
aku bersyukur buat itu.`,

`Tapi semakin hari aku sadar satu hal.

Yang aku kangenin bukan chatnya.
Bukan teleponnya.

Karena semua itu masih ada.

Yang aku kangenin...
adalah perasaan tenang karena tahu kamu masih jadi pacarku.`,

`Kadang pas kita ngobrol aku suka lupa kalau keadaan kita udah berubah.

Masih ketawa.
Masih cerita.
Masih bercanda.

Sampai akhirnya aku ingat...

sekarang semuanya nggak sama seperti dulu lagi.`,

`Kalau dipikir-pikir...

aku nggak kehilangan kamu sepenuhnya.

Tapi aku kehilangan status yang paling aku suka dari kita.

Aku kehilangan kesempatan buat bilang,
"itu pacarku."

Dan ternyata itu lebih berat dari yang aku kira.`,

`Ada banyak pesan yang sebenarnya pernah aku ketik.

Panjang.
Banget.

Tapi akhirnya aku hapus lagi.

Bukan karena aku nggak jadi ngomong.

Aku cuma takut bikin kamu nggak nyaman.`,

`Jujur...

aku seneng karena sampai hari ini kita masih bisa ngobrol.

Walaupun sekarang cuma sebagai teman.

Karena setidaknya aku masih bisa tahu kabar kamu.

Dan itu lebih berarti dari yang mungkin kamu kira.`,

`Aku nggak bikin ini buat maksa kamu balik.

Aku cuma pengen jujur.

Karena sampai hari ini...

di antara banyak hal yang berubah,

perasaanku ke kamu masih belum berubah.`,

`Kalau aku minta kesempatan untuk jadi pacarmu lagi...

apa kamu mau mempertimbangkannya? ❤️`

];

/* =========================
   EFEK KETIK
========================= */

function typeText(id,text){

const el = document.getElementById(id);

if(!el) return;

el.innerHTML = "";

let i = 0;

function typing(){

if(i < text.length){

if(text[i] === "\n"){

el.innerHTML += "<br>";

}else{

el.innerHTML += text[i];

}

i++;

setTimeout(typing,22);

}

}

typing();

}

/* =========================
   PAGE SYSTEM
========================= */

let currentPage = 0;

const pages =
document.querySelectorAll(".page");

/* HALAMAN PERTAMA */

typeText(
"text1",
texts[0]
);

function nextPage(){

if(currentPage === 0){

const musik =
document.getElementById("musik");

if(musik){

musik.volume = 0.6;

musik.play().catch(()=>{});

}

}

pages[currentPage]
.classList.remove("active");

currentPage++;

if(currentPage < pages.length){

pages[currentPage]
.classList.add("active");

const target =
"text"+(currentPage+1);

setTimeout(()=>{

typeText(
target,
texts[currentPage]
);

},150);

}

}

/* =========================
   JAWABAN YA
========================= */

function jawabYa(){

document.getElementById(
"lastCard"
).innerHTML = `

<div class="label">
❤️ makasih
</div>

<div class="text">

Jujur...

aku seneng banget baca itu.

Aku nggak janji bakal jadi sempurna.

Tapi aku janji bakal belajar
dari semua yang pernah terjadi.

Dan kalau kesempatan itu datang lagi...

aku bakal menjaganya
lebih baik dari sebelumnya.

❤️

- Abi

</div>

`;

}

/* =========================
   JAWABAN BELUM
========================= */

function jawabBelum(){

document.getElementById(
"lastCard"
).innerHTML = `

<div class="label">
🌷 terima kasih
</div>

<div class="text">

Nggak apa-apa.

Aku cuma pengen jujur
tentang apa yang aku rasain.

Dan apapun jawabannya...

aku tetap bersyukur
karena kamu udah baca
semuanya sampai akhir.

❤️

- Abi

</div>

`;

}
